name: Eval gate from audit traffic

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/**'
      - 'examples/ci/**'

jobs:
  eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - name: Run eval CI gate from sample audit
        run: |
          pnpm quartermaster eval \
            --ci \
            --min-r8 0.5 \
            --config packages/cli/test/fixtures/eval-config.json \
            --cases packages/cli/test/fixtures/eval-cases.jsonl
