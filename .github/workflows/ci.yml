name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r lint
      - run: pnpm -r test
      - run: pnpm bench -- --ci
      - name: Generate SBOM for quartermaster-mcp
        working-directory: packages/proxy
        run: |
          mkdir -p ../../.sbom-work/pkg
          npm pack --pack-destination ../../.sbom-work
          tar -xzf ../../.sbom-work/quartermaster-mcp-*.tgz -C ../../.sbom-work/pkg
          cd ../../.sbom-work/pkg/package
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); delete p.devDependencies; fs.writeFileSync('package.json', JSON.stringify(p,null,2))"
          npm install --omit=dev --ignore-scripts
          npx --yes @cyclonedx/cyclonedx-npm@1.19 --output-file ../../../../sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error
